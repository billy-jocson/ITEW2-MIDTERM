<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://kit.fontawesome.com" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <div class="row w-100" id="dashboard">
            <!-- SIDE PANEL -->
            <div class="col-auto bg-light shadow-lg p-0 gap-2" id="sidePanel" style="overflow: hidden;">
                <div class="d-flex flex-column h-25 w-100">
                    <button id="sidebarCollapse" class="btn btn-transparent" id="iconToggle" style="width: fit-content;">
                        <i class="fas fa-bars"></i>
                    </button>

                    <h1 class="w-75 mx-auto text-center" id="webName">Readify</h1>
                    <p class="w-75 mx-auto text-center" id="webDesc">An E-Library System.</p>
                </div>

                <a id="showEditProfile" class="">
                    <img class="rounded-circle"
                        src="https://static.vecteezy.com/system/resources/thumbnails/009/292/244/small/default-avatar-icon-of-social-media-user-vector.jpg"
                        alt="" id="profilePicture">
                </a>
                <div class="d-flex flex-column text-center">
                    <span id="profileName" class="fs-5 mx-5 my-0"></span>
                    <i id="role" class="m-0"></i>
                </div>
                <a class="nav-link w-50 mx-auto" id="home">
                    <i class="fa fa-home" aria-hidden="true"></i>
                    <span>Home</span>
                </a>
                <a class="nav-link w-50 mx-auto" id="edit">
                    <i class="fas fa-edit" aria-hidden="true" style="stroke-width: 1px;"></i>
                    <span>Edit Profile</span>
                </a>
                <button class="btn btn-danger rounded-pill w-75 mt-3 mx-5 " id="logOutBtn">Log out</button>
            </div>

            <!-- MAIN DASHBOARD -->
            <div class="col" id="mainContent">
                <div class="mt-3 px-5 w-100 d-flex flex-column gap-4">
                    <div class="d-flex gap-2 flex-column flex-lg-row">
                        <input type="text" id="searchBook" placeholder="Search a book by title or author"
                            class="form-control">

                        <select id="filterCategory" class="form-select w-auto">
                            <option value="">All Categories</option>
                            <option value="Classic">Classic</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Fantasy">Fantasy</option>
                            <option value="Self-Help">Self-Help</option>
                            <option value="Thriller">Thriller</option>
                            <option value="History">History</option>
                            <option value="Mythology">Mythology</option>
                            <option value="Memoir">Memoir</option>
                            <option value="Dystopian">Dystopian</option>
                            <option value="Adventure">Adventure</option>
                            <option value="Psychology">Psychology</option>
                            <option value="Historical Fiction">Historical Fiction</option>
                            <option value="Mystery">Mystery</option>
                        </select>

                        <button id="searchBtn" class="btn btn-primary rounded-pill">Search</button>
                    </div>
                    
                    <div id="adminDashboard" class="row g-3 mb-4" style="display:none;">
                    </div>

                    <div class="row" id="addBook">
                    </div>

                    <div class="row w-100" id="books">
                    </div>
                    <hr>
                </div>

                <div class="mt-3 px-5">
                    <div class="table-responsive mt-3" style="max-height:400px; max-width: 100%;" id="studentTable">
                        <table class="table table-hover w-100">
                            <thead class="table-light sticky-top">
                                <tr>
                                    <th scope="col">Book Title</th>
                                    <th scope="col">Borrowed in</th>
                                    <th scope="col">Returned in</th>
                                    <th scope="col">Action</th>
                                </tr>
                            </thead>
                            <tbody id="transactionTableBody">
                            </tbody>
                        </table>
                    </div>
                    <div id="adminLibrarianTable" class="table-responsive" style="display: none;">
                        <table class="table table-hover w-100">
                            <thead class="table-light sticky-top">
                                <tr>
                                    <th scope="col">Borrower</th>
                                    <th scope="col">Book Title</th>
                                    <th scope="col">Borrowed in</th>
                                    <th scope="col">Returned in</th>
                                    <th scope="col">Action</th>
                                </tr>
                            </thead>
                            <tbody id="returnRequests">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col" id="editProfile" style="display:none;">
                <div class="d-flex flex-column align-items-center justify-content-center gap-2 w-50 mx-auto min-vh-100">
                    <img class="rounded-circle w-50"
                        src="https://static.vecteezy.com/system/resources/thumbnails/009/292/244/small/default-avatar-icon-of-social-media-user-vector.jpg"
                        alt="" id="editProfilePicture">
                    <p id="editDisplayName" class="fs-4"></p>
                    <input type="text" id="newNameInput" placeholder="Enter new name" class="form-control">
                    <input type="password" id="newPasswordInput" placeholder="Enter new password" class="form-control">
                    <button id="btnSaveName" class="btn btn-success rounded-pill mt-2 w-100">Save changes</button>
                    <button id="deleteAccBtn" class="btn btn-outline-danger rounded-pill mt-2 w-100">Delete
                        Account</button>
                </div>
            </div>
        </div>
    </main>

    <script src="Book.js"></script>
    <script src="Account.js"></script>
    <script src="Transaction.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
